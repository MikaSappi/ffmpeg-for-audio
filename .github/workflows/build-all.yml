name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel]
    steps:
      - uses: actions/checkout@v4
      - run: echo "7" | bash macOS/install_macos_static.sh
      - run: cp /usr/local/ffmpeg-static/bin/ffmpeg ./ffmpeg-${{ matrix.os }}
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.os }}
          path: ffmpeg-${{ matrix.os }}

  build-linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4
      - run: echo "7" | bash Linux/install_static_bare.sh
      - run: cp /usr/local/ffmpeg-static-bare/bin/ffmpeg ./ffmpeg-${{ matrix.os }}
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.os }}
          path: ffmpeg-${{ matrix.os }}

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash Windows/makeimage.sh win64 nonfree 7.1
      - run: bash Windows/build.sh win64 nonfree 7.1
      - run: |
          mkdir extracted_zip
          unzip -j artifacts/*.zip -d extracted_zip
          find extracted_zip -type f -exec mv {} ffmpeg.exe \;
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows
          path: ffmpeg.exe

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          files: release-artifacts/**/*
